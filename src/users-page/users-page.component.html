
<app-users-filter (changeFilter)="onSearch($event)"></app-users-filter>
<app-create-user (createUser)="onAddUser($event)"></app-create-user>
<div class="users-container">
  @for (user of filteredUsers$ | async; track user.id) {
    <app-user-card [user]="user" (delete)="onDeleteUser($event)"></app-user-card>
  } @empty() {
    <div class="error-message">Нет пользователей для отображения</div>
  }
</div>
