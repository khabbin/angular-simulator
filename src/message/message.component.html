<div class="messages-box">
  @for (message of messageService.messages$ | async; track $index) {
    <ng-container 
      [ngTemplateOutlet]="systemMessage" 
      [ngTemplateOutletContext]="{ $implicit: message }">
    </ng-container>
  }
</div>

<ng-template #systemMessage let-message>
  <div class="system-message">
    <img src="/images/message-icon.svg" alt="message-icon">
    <div class="text-content">
      <span>{{ message.type }}</span>
      <span>{{ message.text }}</span>
    </div>
    <div class="message-close-button" (click)="messageService.closeMessage(message)"></div>
  </div>
</ng-template>
